<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>my-first-project</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Overpass:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>


<main class="card">

    <div class="card__rating">
        <div class="star__wrap">
        <img src="images/icon-star.svg" alt="">
    </div>
    <h1 class="card__title">How did we do?</h1>
    <p class="card__subtitle">Please let us know how we did with your support request. All feedback is appreciated to help us improve our offering!</p>

    <div class="card__dots">
        <div class="dot">1</div>
        <div class="dot">2</div>
        <div class="dot">3</div>
        <div class="dot">4</div>
        <div class="dot">5</div>
    </div>
    <button class="card__button" type="submit">Submit</button>

    </div> <!-- card__rating -->
    


    <div class="card__thank-you">
      <div class="thank__wrap">
        <img src="images/illustration-thank-you.svg" alt="">
      </div>
      <p class="card__rating-result">You selected 4 out of 5</p>

      <h1>Thank You</h1>
      <p>We appreciate you taking the time to give a rating. If you ever need more support, don't hesitate to get in touch!</p>
    </div>
</main> <!-- MAIN EPT  -->
   
  
<script src="script.js"></script>    
</body>
</html>
